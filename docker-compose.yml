version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./instance:/app/instance
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=0
      - DATABASE_URI=mysql+pymysql://root:192003@db:3306/Prime
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=Prime
      - MYSQL_ROOT_PASSWORD=192003
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:

